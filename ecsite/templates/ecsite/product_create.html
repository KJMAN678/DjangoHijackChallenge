{% extends 'ecsite/base.html' %}

{% block title %}商品登録 - ECサイト{% endblock %}

{% block content %}
<h2>商品登録</h2>

<form method="post" style="max-width: 500px;">
    {% csrf_token %}
    <div style="margin-bottom: 15px;">
        <label for="name" style="display: block; margin-bottom: 5px; font-weight: bold;">商品名:</label>
        <input type="text" id="name" name="name" required 
               style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px;">
    </div>
    
    <div style="margin-bottom: 15px;">
        <label for="price" style="display: block; margin-bottom: 5px; font-weight: bold;">単価 (円):</label>
        <input type="number" id="price" name="price" step="0.01" min="0" required 
               style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px;">
    </div>
    
    <button type="submit" 
            style="background-color: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; font-size: 16px; cursor: pointer;">
        商品を登録
    </button>
    
    <a href="{% url 'ecsite:product_list' %}" 
       style="margin-left: 10px; color: #6c757d; text-decoration: none;">キャンセル</a>
</form>

<div style="margin-top: 30px; padding: 15px; background-color: #e9ecef; border-radius: 4px;">
    <h4>注意事項:</h4>
    <ul>
        <li>商品登録後は、管理画面から在庫（Supply）を追加してください。</li>
        <li>商品名は重複しても構いません。</li>
        <li>価格は小数点以下2桁まで入力可能です。</li>
    </ul>
</div>
{% endblock %}
